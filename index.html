<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scentify Payment</title>

<!-- ================================================ -->
<!-- REPLACE G-XXXXXXXXXX WITH YOUR GOOGLE ANALYTICS ID -->
<!-- ================================================ -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-45YJSJL894"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XXXXXXXXXX', {
    send_page_view: true
  });
</script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #061539;
  color: #fff;
}

.header {
  text-align: center;
  padding: 30px 20px 10px;
}

.header img {
  width: 220px;
  margin-bottom: 10px;
}

.subtitle {
  color: #d4af37;
  letter-spacing: 2px;
  font-size: 14px;
}

.card {
  background: #ffffff;
  color: #000;
  margin: 20px;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

.bank-header {
  display: flex;
  align-items: center;
  gap: 15px;
}

.bank-header img {
  width: 60px;
  border-radius: 10px;
}

.badge {
  background: #d4af37;
  color: #000;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  margin-left: 10px;
}

.account-name-pill {
  display: inline-block;
  background: #eeeeee;
  color: #333;
  font-size: 13px;
  padding: 4px 10px;
  border-radius: 20px;
  margin-top: 6px;
}

.account {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f4f4f4;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

.currency {
  background: #eee;
  padding: 8px 12px;
  border-radius: 8px;
  font-weight: bold;
  margin-bottom: 4px;
}

button {
  background: #061539;
  color: #d4af37;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.25s ease;
  font-size: 14px;
}

button:hover {
  transform: scale(1.05);
}

button.copied {
  background: #1e7e34;
  color: #fff;
}

button::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  left: var(--x);
  top: var(--y);
  opacity: 0;
}

button:active::after {
  width: 200px;
  height: 200px;
  opacity: 1;
  transition: 0.4s;
}

.footer-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.small {
  color: #666;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
  <img src="scentify-logo.png" alt="Scentify Logo">
  <div class="subtitle">BANK TRANSFER DETAILS</div>
</div>

<!-- BML -->
<div class="card">
  <div class="bank-header">
    <img src="bml-logo.png" alt="BML">
    <div>
      <b>Bank of Maldives</b>
      <span class="badge">PRIMARY</span><br>
      <span class="account-name-pill">A.L.B.A</span>
    </div>
  </div>

  <div class="account">
    <div>
      <div class="currency">MVR</div>
      <b id="bml_mvr">7730000170957</b>
    </div>
    <button onclick="copyText(event, 'bml_mvr', this, 'BML MVR Account')">Copy</button>
  </div>

  <div class="account">
    <div>
      <div class="currency">USD</div>
      <b id="bml_usd">773000055835</b>
    </div>
    <button onclick="copyText(event, 'bml_usd', this, 'BML USD Account')">Copy</button>
  </div>
</div>

<!-- MIB -->
<div class="card">
  <div class="bank-header">
    <img src="mib-logo.png" alt="MIB">
    <div>
      <b>Maldives Islamic Bank</b><br>
      <span class="account-name-pill">Scentify</span>
    </div>
  </div>

  <div class="account">
    <div>
      <div class="currency">MVR</div>
      <b id="mib_mvr">90103100003651001</b>
    </div>
    <button onclick="copyText(event, 'mib_mvr', this, 'MIB MVR Account')">Copy</button>
  </div>
</div>

<!-- SLIP -->
<div class="card footer-card">
  <div>
    <b>Send payment confirmation</b><br>
    <span class="small">WhatsApp or Viber</span><br>
    <b id="phone">+9607700062</b>
  </div>
  <button onclick="copyText(event, 'phone', this, 'Phone Number')">Copy</button>
</div>

<script>
  // ── Time tracking ──────────────────────────────────────────
  const pageOpenTime = Date.now();

  window.addEventListener('beforeunload', () => {
    const secondsSpent = Math.round((Date.now() - pageOpenTime) / 1000);
    gtag('event', 'time_on_page', {
      event_category: 'Engagement',
      event_label: 'Seconds on page',
      value: secondsSpent
    });
  });

  // ── Scroll depth ───────────────────────────────────────────
  let maxScroll = 0;
  window.addEventListener('scroll', () => {
    const scrolled = Math.round((window.scrollY + window.innerHeight) / document.body.scrollHeight * 100);
    if (scrolled > maxScroll) {
      maxScroll = scrolled;
      if ([25, 50, 75, 100].includes(maxScroll)) {
        gtag('event', 'scroll_depth', {
          event_category: 'Engagement',
          event_label: maxScroll + '% scrolled'
        });
      }
    }
  });

  // ── QR vs direct visit ─────────────────────────────────────
  gtag('event', 'page_open', {
    event_category: 'Traffic',
    event_label: document.referrer ? 'Referral: ' + document.referrer : 'Direct / QR scan'
  });

  // ── Copy button tracking ───────────────────────────────────
  function copyText(e, id, btn, label) {
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text);

    // Track in Google Analytics
    gtag('event', 'copy_button_clicked', {
      event_category: 'Copy',
      event_label: label,
    });

    // Ripple
    const rect = btn.getBoundingClientRect();
    btn.style.setProperty('--x', (e.clientX - rect.left) + 'px');
    btn.style.setProperty('--y', (e.clientY - rect.top) + 'px');

    // Feedback
    const original = btn.innerText;
    btn.innerText = "Copied ✓";
    btn.classList.add("copied");

    setTimeout(() => {
      btn.innerText = original;
      btn.classList.remove("copied");
    }, 1500);
  }
</script>

</body>
</html>
